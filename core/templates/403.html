{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}{% endblock %}</title>
    <!-- base:css -->
    <link rel="stylesheet" href="{% static 'vendors/typicons.font/font/typicons.css' %}">
    <link rel="stylesheet" href="{% static 'vendors/css/vendor.bundle.base.css' %}">
    <!-- endinject -->
    <!-- plugin css for this page -->
    <!-- End plugin css for this page -->
    <!-- inject:css -->
    <link rel="stylesheet" href="{% static 'css/vertical-layout-light/style.css' %}">
    <!-- endinject -->
    {% if company and company.logo %}
      <link rel="shortcut icon" href="{{ company.logo.url }}">
    {% endif %}
  </head>
<body>
	<div class="text-center mt-5">
	    <h1 class="text-danger">403</h1>
	    <h3>Accès refusé</h3>
	    <p>Vous n’êtes pas autorisé à accéder à cette page.</p>
	    <p>Veuillez contacter l’administrateur si vous pensez qu’il s’agit d’une erreur.</p>
	    <a href="{% url 'account:logout' %}" class="btn btn-primary mt-3">Logout</a>
	</div>

</body>
<footer>
	 <script src="{% static 'vendors/js/vendor.bundle.base.js' %}"></script>
    <!-- endinject -->
    <!-- Plugin js for this page-->
    <!-- End plugin js for this page-->
    <!-- inject:js -->
    <script src="{% static 'js/off-canvas.js' %}"></script>
    <script src="{% static 'js/hoverable-collapse.js' %}"></script>
    <script src="{% static 'js/template.js' %}"></script>
    <script src="{% static 'js/settings.js' %}"></script>
    <script src="{% static 'js/todolist.js' %}"></script>
    <!-- endinject -->
    <!-- plugin js for this page -->
    <script src="{% static 'vendors/progressbar.js/progressbar.min.js' %}"></script>
    <script src="{% static 'vendors/chart.js/Chart.min.js' %}"></script>
    <!-- End plugin js for this page -->
    <!-- Custom js for this page-->
    <script src="{% static 'js/dashboard.js' %}"></script>
</footer>
</html>
