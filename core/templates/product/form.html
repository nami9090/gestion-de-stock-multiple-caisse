{% extends 'base.html' %}
{% load static %}
{% block title %}
  Ajouter produits
{% endblock %}
{% block content %}
  <!-- partial -->
  <div class="container-fluid main-panel">
    <div class='card shadow-lg mb-3'>
     <div class="card-header bg-primary text-white">
        <h5 class="mb-0">{{ title }}</h5>
    </div>
    </div>
    <div class='card-body'>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
            <div class="d-flex justify-content-between">
                <a href="{% url 'product_list_prod' %}" class="btn btn-outline-secondary btn-sm">
                    Retour
                </a>
                <button type="submit" class="btn btn-outline-primary btn-sm">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
    <!-- partial -->
  </div>
  <!-- main-panel ends -->
{% endblock %}
