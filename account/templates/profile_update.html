{% extends 'base.html' %}
{% block title %}
    Profile update
{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="card shadow">
        <div class="card-header">
            <h3>Modifier la photo de profil</h3>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-primary btn-sm">
                    Enregistrer
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
